<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vowel or Consonant Checker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Vowel or Consonant Checker</h2>

        <input type="text" id="charInput" maxlength="1" placeholder="Enter a character">

        <br>
        <button onclick="checkCharacter()">Check</button>

        <p id="result"></p>
    </div>

    <!-- Link JavaScript -->
    <script src="script.js"></script>
</body>
</html>
